    <style>
        #table-wrapper {
          position:relative;
          padding-bottom: 20px;
          padding-left: 5px;
          padding-right: 5px;
        
        }
          #table-scroll {
            max-height:550px;
            min-height:50px;
            overflow:scroll;  
            margin-top:5px;
          }
          #table-wrapper table {
            width:100%;
          
          }
          #table-wrapper table * {
            /*background:yellow;*/
            color:black;
          }
          #table-wrapper table thead th .text {
            position:absolute;   
            top:-20px;
            z-index:2;
            height:20px;
            width:35%;
            border:1px solid red;
          }
          td, th {
              padding: 0px;
              min-width: 0px; 
              }
              
          </style>
