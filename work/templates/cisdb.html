{% extends "base.html" %}

{% block body %}
<style>
  #table-wrapper {
    position:relative;
    padding-bottom: 20px
  }
  #table-scroll {
    max-height:500px;
    min-height:0px;
    overflow:scroll;  
    margin-top:20px;
  }
  #table-wrapper table {
    width:100%;
  
  }
  #table-wrapper table * {
    /*background:yellow;*/
    color:black;
  }
  #table-wrapper table thead th .text {
    position:absolute;   
    top:-20px;
    z-index:2;
    height:20px;
    width:35%;
    border:1px solid red;
  }
  td, th {
      padding: 0px;
      min-width: 0px; 
      }
  </style>

<div class="jumbotron border shadow" style="background-color: #337ab7; padding: 20px;">
    <div class="row" style="margin-right: 0px; margin-left: 0px;">
        <div class="col-md-12 offset-2" >
            <form action="">
                <div class="input-group" style="display: flex;">
                    <input type="text" name="q" placeholder="Query to CISDB"
                    class="form-control form-control-lg" />
                    <div class="input-group-append">
                        <button class="btn-lg">Send</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

{% if q is not None%}
<div class="content" style="padding-left: 15px; padding-right: 15px;">
{{q}}
</div>
{% endif %}

<hr>
<div class="content" style="padding-left: 15px; padding-right: 15px;">
<div id="table-wrapper">
  <div id="table-scroll">
    <td><p style="float: right; padding-right: 10px;">Filter: 
      <input id="myInput_1" type="text" placeholder="Search.." style="margin: 0px; width: auto; text-align: left; padding: 0px;">
    </p></td>

<table id="tab1" class="table table-striped">
  <thead>
  <tr style="background-color: darkgrey;">
    {% for line in column_names_list %}
    <th>{{line}} </th>
    {% endfor %}
  </tr>
</thead>
<tbody>
  {% for row in export %}
  <tr align="center">
    {% for a in row %}<th>{{a}}</th>{% endfor %}
  </tr>
  {% endfor %} 
</tbody> 
</tbody>
</table>

  </div>
  <button id="createXLSX">Export XLSX</button>
</div>

</div>


<script>

$(document).ready(function(){
    $("#myInput_1").on("keyup", function() {
      var value = $(this).val().toLowerCase();
      $("#tab1 tbody tr").filter(function() {
        $(this).toggle($(this).text().toLowerCase().indexOf(value) > -1)
      });
    });

  });
  // export excel 
  var btn = document.getElementById("createXLSX");
  var fileName = "export_report";
  var fileType = "xlsx";
  btn.addEventListener("click", function() {
    var table = document.getElementById("tab1");
    var wb = XLSX.utils.table_to_book(table, {sheet: "Sheet JS"});
    return XLSX.writeFile(wb, null || fileName + "." + (fileType || "xlsx"));
  });


</script>
{% endblock %}
